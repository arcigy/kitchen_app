<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parametric Drawer Cabinet (MVP)</title>
    <script type="module" crossorigin src="/assets/index-B_HTr6o-.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-XeWvDpWk.css">
  </head>
  <body>
    <div id="app">
      <header id="ribbon" aria-label="Ribbon toolbar"></header>

      <div id="main">
      <aside id="properties" aria-label="Properties"></aside>
      <div id="viewer" aria-label="3D viewer">
        <button id="resetViewBtn" type="button" title="Reset view">Reset view</button>
      </div>
      <aside id="sidebar">
        <header class="sidebar-header">
          <h1>Drawer cabinet</h1>
          <p class="muted">JSON → geometry (Three.js)</p>
        </header>

        <div id="form"></div>

        <div class="actions">
          <button id="resetBtn" type="button">Reset to defaults</button>
          <button id="exportBtn" type="button">Export + copy JSON</button>
          <button id="exportSceneBtn" type="button">Export scene JSON (Blender)</button>
        </div>

        <div id="errors" class="errors" role="alert" aria-live="polite"></div>

        <section class="parts">
          <h2>Parts</h2>
          <div id="parts"></div>
        </section>

        <section class="parts">
          <h2>Measure</h2>
          <div class="actions">
            <button id="measureBtn" type="button">Measure: Off</button>
            <button id="clearMeasuresBtn" type="button">Clear</button>
          </div>
          <div class="field">
            <label for="axisLock">Axis lock (X/Z)</label>
            <input id="axisLock" type="checkbox" checked />
          </div>
          <p id="measureReadout" class="muted"></p>
        </section>

        <div class="export">
          <label for="exportOut" class="muted">Export</label>
          <textarea id="exportOut" readonly rows="10"></textarea>
          <div class="actions">
            <button id="copyBtn" type="button">Copy export</button>
            <div id="copyStatus" class="muted" style="align-self:center;"></div>
          </div>

          <div class="field" style="margin-top:10px;">
            <label class="muted">Blender preview</label>
            <img id="blenderPreview" alt="Blender preview render" style="width:100%; border-radius:8px; background:#111; aspect-ratio:1/1; object-fit:cover;" />
          </div>

          <div class="blender-status">
            <div class="row">
              <div class="left">
                <span id="blenderSpinner" class="spinner" aria-hidden="true"></span>
                <span id="blenderStatus" class="muted">Idle.</span>
              </div>
              <a id="blenderPreviewLink" class="muted" href="#" target="_blank" rel="noreferrer" style="display:none;">Open</a>
            </div>
            <pre id="blenderError" class="blender-error" style="display:none;"></pre>
          </div>
        </div>
      </aside>
      </div>
    </div>

  </body>
</html>
